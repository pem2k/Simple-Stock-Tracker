<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>
  <body class="container">
    <header class="navbar navbar-expand-lg sticky-top bg-body">
      <a class="nav-link" href="#top">The Simple Stock Tracker</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#main-nav"
        aria-controls="main-nav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="main-nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" role="button" id="logout">Logout</a>
          </li>
        </ul>
      </div>
    </header>

    <main class="row g-3 mt-4 align-items-center">
      <div class="col-lg-8">
        <canvas id="holdings-chart"></canvas>
      </div>
      <div class="col-lg-4 mt-4 mt-lg-0">
        <form id="add-holding-form">
          <div class="mb-3">
            <label for="ticker" class="form-label">Ticker</label>
            <input
              type="text"
              class="form-control"
              id="ticker"
              placeholder="AAPL"
              required
            />
          </div>
          <div class="mb-3">
            <label for="units" class="form-label">Units Purchased</label>
            <input
              type="number"
              class="form-control"
              id="units"
              min="0"
              step="any"
              placeholder="10"
              required
            />
          </div>
          <div class="mb-3">
            <label for="purchase-date" class="form-label">Purchase Date</label>
            <input
              type="date"
              class="form-control"
              id="purchase-date"
              required
            />
          </div>
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary">Add Holding</button>
          </div>
        </form>
      </div>

      <section class="mt-4">
        <h2>Your Holdings</h2>
        <div id="holdings-card-container" class="row g-3"></div>
      </section>
    </main>
    <footer class="mt-3"></footer>
    <script type="module" src="../js/modules/logout.js"></script>
    <script type="module" src="../js/modules/addHolding.js"></script>
    <script type="module" src="../js/modules/chartBuilder.js"></script>
    <script type="module" src="../js/modules/cardBuilder.js"></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
