<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic page setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page title shown in the browser tab -->
    <title>Login | Simple Stock Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Login page CSS -->
    <link rel="stylesheet" href="../css/login.css" />

  </head>

  <body>
    <main class="auth-page">
      <section class="auth-card">
        <h1>Login</h1>

        <p class="auth-description">
          Sign in to view and manage your stock tracker account.
        </p>

        <!-- This is the login form. We use a real <form>, <label>, <input>, and <button> because the rubric says not to use divs/spans as buttons. -->
        <form id="loginForm">
          <div class="form-group">
            <label for="loginUsername">Username</label>
            <input
              id="loginUsername"
              name="username"
              type="text"
              placeholder="Enter your username"
              required
            />
          </div>

          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input
              id="loginPassword"
              name="password"
              type="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <button type="submit">Login</button>
        </form>

        <!-- JavaScript will place success/error messages here -->
        <p id="authMessage" class="auth-message"></p>

        <p class="auth-link">
          No account yet?
          <a href="/signup">Create one here</a>
        </p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="../js/modules/auth.js"></script>
  </body>
</html>
